<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barbearia CDB - Autenticação</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<div class="auth-wrapper">

    <!-- LADO ESQUERDO -->
    <div class="auth-side-banner">
        <div class="banner-content">

            <img src="imagens/logo.jpeg"
            alt="Logo Clube dos Barbas"
            class="logo-img">

            <p class="frase-efeito">
                Estilo e tradição em cada corte.
            </p>

        </div>
    </div>


    <!-- LADO DIREITO -->
    <div class="auth-side-form">


        <!-- LOGIN -->
        <div class="auth-card" id="view-login">

            <div class="header-text">
                <h2><span>Login</span> </h2>
                
            </div>

            <form id="form-login">

                <div class="input-group">
                    <i data-lucide="user"></i>
                    <input type="text"
                    id="login-cpf"
                    placeholder="CPF"
                    required>
                </div>

                <div class="input-group">
                    <i data-lucide="lock"></i>
                    <input type="password"
                    id="login-senha"
                    placeholder="Senha"
                    required>
                </div>

                <button
                type="submit"
                class="btn-primary"
                id="btn-submit-login">
                ENTRAR
                </button>

            </form>

            <a href="#" class="forgot-password">
                Esqueci minha senha
            </a>

            <a href="#" class="create-account" id="btn-ir-cadastro">
                <i data-lucide="log-in"></i>
                Criar conta
            </a>

        </div>


        <!-- CADASTRO -->
        <div class="auth-card hidden" id="view-cadastro">

            <div class="header-text">
                <h2><span>Cadastro</span></h2>
                
            </div>

            <form id="form-cadastro">

                <div class="input-group">
                    <i data-lucide="user"></i>
                    <input type="text"
                    id="cad-nome"
                    placeholder="Nome completo"
                    required>
                </div>

                <div class="input-group">
                    <i data-lucide="file-text"></i>
                    <input type="text"
                    id="cad-cpf"
                    placeholder="CPF (Apenas números)"
                    required>
                </div>

                <div class="input-group">
                    <i data-lucide="phone"></i>
                    <input type="text"
                    id="cad-whatsapp"
                    placeholder="WhatsApp"
                    required>
                </div>

                <div class="input-group">
                    <i data-lucide="lock"></i>
                    <input type="password"
                    id="cad-senha"
                    placeholder="Senha"
                    required>
                </div>

                <div class="input-group">
                    <i data-lucide="image"></i>
                    <input type="url"
                    id="cad-fotoUrl"
                    placeholder="URL da foto (Opcional)">
                </div>

                <button
                type="submit"
                class="btn-primary"
                id="btn-submit-cadastro">
                CADASTRAR
                </button>

            </form>

            <a href="#" class="create-account" id="btn-voltar-login">
                <i data-lucide="arrow-left"></i>
                Voltar para o login
            </a>

        </div>

    </div>
</div>


<!-- ICONES -->
<script>
lucide.createIcons();
</script>

<!-- JS -->
<script src="js/login.js"></script>

</body>
</html>
