# Nome da aplicação
spring.application.name=agenda-cdb

# Configuração do Banco de Dados (PostgreSQL no Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/barbearia_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Chave secreta para o Token JWT
api.security.token.secret=${JWT_SECRET:minha-chave-secreta-ultra-mega-segura-123}

# Configuração de fuso horário (Brasil)
spring.jackson.time-zone=America/Sao_Paulo

# Dados do Administrador Padrão (Seeder)
admin.default.nome=${ADMIN_NOME:Alef Amaral}
admin.default.cpf=${ADMIN_CPF:07934307632}
admin.default.whatsapp=${ADMIN_WHATSAPP:33999026412}
admin.default.senha=${ADMIN_SENHA:Afra-1993}

# Configuração de CORS (URLs permitidas para acessar a API)
cors.allowed-origins=${CORS_ORIGINS:http://127.0.0.1:5500,http://localhost:5500}