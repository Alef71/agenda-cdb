# Nome da aplicação
spring.application.name=agenda-cdb

# Configuração do Banco de Dados (PostgreSQL no Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/barbearia_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Chave secreta para o Token JWT
api.security.token.secret=${JWT_SECRET:minha-chave-secreta-ultra-mega-segura-123}

# Configuração de fuso horário (Brasil)
spring.jackson.time-zone=America/Sao_Paulo